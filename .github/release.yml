changelog:
  exclude:
    labels:
      - skip-release-notes
      - internal
      - chore
      - dependencies
    authors:
      - github-actions[bot]
  categories:
    - title: Features
      labels:
        - feature
        - enhancement
        - desktop
    - title: Fixes
      labels:
        - fix
        - bug
        - bugfix
    - title: Documentation
      labels:
        - docs
    - title: Maintenance
      labels:
        - refactor
        - test
        - ci
        - build
    - title: Other Changes
      labels:
        - "*"
